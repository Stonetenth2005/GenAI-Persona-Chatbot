<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with your favorite Scaler mentors — Anshuman Singh, Abhimanyu Saxena, and Kshitij Mishra — powered by Llama 3.1.">
  <title>Scaler Persona Chatbot</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="app-container">
    <header>
      <h1>Scaler Connect</h1>
      <p>Chat with your favorite Scaler mentors</p>
    </header>

    <div class="persona-switcher">
      <button class="persona-btn active" data-persona="anshuman">
        <img src="https://ui-avatars.com/api/?name=Anshuman+Singh&background=0EA5E9&color=fff" alt="Anshuman">
        Anshuman Singh
      </button>
      <button class="persona-btn" data-persona="abhimanyu">
        <img src="https://ui-avatars.com/api/?name=Abhimanyu+Saxena&background=334155&color=fff" alt="Abhimanyu">
        Abhimanyu Saxena
      </button>
      <button class="persona-btn" data-persona="kshitij">
        <img src="https://ui-avatars.com/api/?name=Kshitij+Mishra&background=64748B&color=fff" alt="Kshitij">
        Kshitij Mishra
      </button>
    </div>

    <div class="chat-container">
      <div class="active-persona-banner">
        <span id="active-persona-name">Currently chatting with Anshuman Singh</span>
      </div>
      
      <div class="chat-box" id="chat-box">
        <!-- Messages will be injected here -->
      </div>

      <div class="typing-indicator" id="typing-indicator">
        <span></span><span></span><span></span>
      </div>

      <div class="suggestion-chips" id="suggestion-chips">
        <!-- Suggestion chips will be injected here -->
      </div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
        <button id="send-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
  
  <script src="js/app.js"></script>
</body>
</html>
